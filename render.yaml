services:
  - type: web
    name: healthguard-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      # Add your Groq API key in the Render Dashboard later!
      # - key: GROQ_API_KEY
      #   sync: false
