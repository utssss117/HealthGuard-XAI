name: CI — HealthGuard-XAI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest-cov httpx

      - name: Lint with Ruff
        run: |
          ruff check backend/

      - name: Verify core imports
        run: |
          python -c "from health_llm_assistant.safety_filter import check_safety; print('✅ safety_filter OK')"
          python -c "from recommendation_engine.rule_engine import apply_clinical_rules; print('✅ rule_engine OK')"
          python -c "from risk_modeling.preprocessing import preprocess_data; print('✅ preprocessing OK')"
          python -c "from explainability.counterfactual_advisor import generate_counterfactual; print('✅ counterfactual_advisor OK')"
          python -c "from utils.session_tracker import SessionTracker; print('✅ session_tracker OK')"

      - name: Run Core & API Endpoint Tests
        run: |
          pytest tests/ backend/tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
