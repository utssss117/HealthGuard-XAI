name: CI — HealthGuard-XAI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify core imports
        run: |
          python -c "from health_llm_assistant.safety_filter import check_safety; print('✅ safety_filter OK')"
          python -c "from phase3_recommendation_engine.rule_engine import apply_clinical_rules; print('✅ rule_engine OK')"
          python -c "from risk_modeling.preprocessing import preprocess_data; print('✅ preprocessing OK')"
          python -c "from explainability.counterfactual_advisor import generate_counterfactual; print('✅ counterfactual_advisor OK')"
          python -c "from utils.session_tracker import SessionTracker; print('✅ session_tracker OK')"

      - name: Run Unit Tests
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  train-check:
    name: Training Script Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check training script imports
        run: |
          python -c "
          import ast, sys
          with open('risk_modeling/train.py') as f:
              source = f.read()
          try:
              ast.parse(source)
              print('✅ train.py syntax OK')
          except SyntaxError as e:
              print(f'❌ Syntax error: {e}')
              sys.exit(1)
          "
